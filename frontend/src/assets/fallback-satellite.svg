<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="satGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7d3cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#spaceGrad)"/>
  
  <!-- Stars -->
  <circle cx="50" cy="50" r="1" fill="white" opacity="0.8"/>
  <circle cx="150" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="250" cy="40" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="100" r="1" fill="white" opacity="0.8"/>
  <circle cx="100" cy="200" r="1" fill="white" opacity="0.6"/>
  <circle cx="300" cy="250" r="1.5" fill="white" opacity="0.7"/>
  
  <!-- Earth (bottom) -->
  <ellipse cx="200" cy="280" rx="120" ry="40" fill="#1e3a8a" opacity="0.6"/>
  <ellipse cx="200" cy="280" rx="100" ry="30" fill="#2563eb" opacity="0.4"/>
  
  <!-- Satellite -->
  <g transform="translate(200, 120)">
    <!-- Main body -->
    <rect x="-15" y="-8" width="30" height="16" rx="3" fill="url(#satGrad)"/>
    <!-- Solar panels -->
    <rect x="-25" y="-6" width="10" height="12" rx="2" fill="#00c6ff" opacity="0.7"/>
    <rect x="15" y="-6" width="10" height="12" rx="2" fill="#00c6ff" opacity="0.7"/>
    <!-- Antenna -->
    <line x1="0" y1="-8" x2="0" y2="-18" stroke="#7d3cff" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-18" r="3" fill="#7d3cff"/>
  </g>
  
  <!-- Orbit line -->
  <ellipse cx="200" cy="150" rx="150" ry="80" fill="none" stroke="#7d3cff" stroke-width="1" opacity="0.3" stroke-dasharray="5,5"/>
</svg>

