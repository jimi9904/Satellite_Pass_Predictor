services:
  - type: web
    name: satellite-pass-predictor-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false        # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false        # Set this in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: OPENWEATHER_API_KEY
        sync: false        # Set this in Render dashboard
      - key: TLE_REFRESH_INTERVAL_HOURS
        value: 6
      - key: CLIENT_URL
        value: https://satellitepasspredictor.vercel.app
    healthCheckPath: /api/health
